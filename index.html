<!DOCTYPE html>
<html>
<head>
<title>SuperTiers</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
}

h1{
font-size:40px;
margin:20px;
}

button{
padding:8px 12px;
margin:6px;
}

.category{
margin:30px;
}

.players{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#2b2b2b;
border-radius:10px;
padding:10px;
margin:10px;
width:140px;
}

.card img{
width:90px;
}

.rank{
color:gold;
font-weight:bold;
}

.points{
color:#00ffcc;
}

</style>

</head>

<body>

<h1>SuperTiers</h1>

<button onclick="login()">Admin Login</button>
<button onclick="addPlayer()">Add Player</button>

<div id="categories"></div>

<script>

let admin=false
let password="1234"

const tierPoints={
"LT5":1,
"HT5":2,
"LT4":4,
"HT4":6,
"LT3":15,
"HT3":25,
"LT2":45,
"HT2":65,
"LT1":85,
"HT1":100
}

let players=[]

function login(){

let input=prompt("Admin password")

if(input===password){
admin=true
alert("Admin enabled")
}

}

function addPlayer(){

if(!admin) return

let name=prompt("Minecraft username")
let tier=prompt("Tier (HT1 LT2 etc)").toUpperCase()
let category=prompt("Category (Door PvP, Steak PvP etc)")

let points=tierPoints[tier]||0

players.push({name,tier,category,points})

render()

}

function render(){

let container=document.getElementById("categories")
container.innerHTML=""

let categories=[...new Set(players.map(p=>p.category))]

categories.forEach(cat=>{

let div=document.createElement("div")
div.className="category"

let title=document.createElement("h2")
title.innerText=cat

div.appendChild(title)

let playerBox=document.createElement("div")
playerBox.className="players"

let sorted=players
.filter(p=>p.category===cat)
.sort((a,b)=>b.points-a.points)

sorted.forEach((p,i)=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="rank">#${i+1}</div>
<img src="https://crafatar.com/renders/body/${p.name}?size=128">
<div>${p.name}</div>
<div>${p.tier}</div>
<div class="points">${p.points} pts</div>
`

playerBox.appendChild(card)

})

div.appendChild(playerBox)

container.appendChild(div)

})

}

render()

</script>

</body>
</html>
